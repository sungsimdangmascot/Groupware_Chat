spring.application.name=Groupware_Chat

# 서버 포트 번호 설정
server.port=8821

# /html 폴더의 HTML 화면도 브라우저에서 직접 열 수 있게 제공
spring.web.resources.static-locations=classpath:/static/,classpath:/html/


# -------------------------------------
# 1. mysql DB연결
# --------------------------------------

#-------------------------------------
# 1. mysql DB연결
#-------------------------------------


# DB서버 주소(내 PC = localhost, 포트 3306, DB명 = springdb)
# useSSL=false          : SSL 보안 연결 사용 안 함 (로컬 개발 환경)
# serverTimezone        : 서버 시간대를 한국(Asia/Seoul)으로 지정
# characterEncoding     : 한글이 깨지지 않도록 UTF-8 인코딩 지정
spring.datasource.url=jdbc:mysql://localhost:3306/groupware?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true

# DB 접속 아이디
spring.datasource.username=root


spring.datasource.password=${DB_PASSWORD:}

# MySQL JDBC 드라이버 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ----------------------------------------------
# 2. MyBatis 설정
# ---------------------------------------------


# 2. MyBatis 설정
#-------------------------------------------------------------------------


# Mapper xml 파일 위치 : resources/mappers/ 폴더 안의 모든 xml
mybatis.mapper-locations=classpath:mappers/**/*.xml


# DB 컬럼명(member_id)을 자바 필드명(memberId)으로 자동 변환

# DB 컬럼명 (member_id

mybatis.configuration.map-underscore-to-camel-case=true


# 세션 ID를 URL 에 붙이지 않고 쿠키로만 전달
# 이 설정이 없으면 로그인·회원가입 후 URL 뒤에 ;jsessionid=... 가 붙어서 이동됨
server.servlet.session.tracking-modes=cookie

# 채팅 단독 개발용: 로그인 모듈이 아직 없어도 첫 번째 직원으로 세션을 만들어 테스트
chat.dev-login.enabled=${CHAT_DEV_LOGIN_ENABLED:true}
chat.dev-login.create-demo-room=${CHAT_DEV_LOGIN_CREATE_DEMO_ROOM:true}
